<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>フランス語 重要1000語 MCQ暗記アプリ</title>
  <style>
    :root {
      --bg:#f6f7fb; --card:#ffffff; --ink:#172033; --muted:#68748a; --line:#dfe4ee;
      --primary:#2457e6; --primary2:#eef3ff; --ok:#0f8a4b; --okbg:#e9f8ef;
      --ng:#c33232; --ngbg:#fff0f0; --warn:#9a6500; --warnbg:#fff6df;
      --shadow:0 14px 38px rgba(27,39,67,.10); --radius:22px;
    }
    *{box-sizing:border-box}
    body{margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(180deg,#f2f5ff 0%, var(--bg) 45%); color:var(--ink);}
    .app{max-width:880px; margin:0 auto; padding:16px 14px 92px;}
    header{position:sticky; top:0; z-index:10; margin:0 -14px 12px; padding:12px 14px 10px; backdrop-filter: blur(14px); background:rgba(246,247,251,.84); border-bottom:1px solid rgba(223,228,238,.75)}
    .topline{display:flex; align-items:center; justify-content:space-between; gap:10px}
    h1{font-size:20px; line-height:1.22; margin:0; letter-spacing:.01em}
    .subtitle{font-size:12px; color:var(--muted); margin-top:4px}
    .pill{font-size:12px; color:var(--primary); background:var(--primary2); border:1px solid #d8e3ff; border-radius:999px; padding:6px 9px; white-space:nowrap; font-weight:700}
    .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin:12px 0}
    .controls{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    label{font-size:12px; color:var(--muted); display:block; margin-bottom:6px}
    select, button, input{font:inherit}
    select{width:100%; border:1px solid var(--line); border-radius:14px; padding:12px; background:white; color:var(--ink)}
    .smallbtn{border:1px solid var(--line); background:white; border-radius:14px; padding:11px 12px; font-weight:700; color:var(--ink)}
    .smallbtn.primary{background:var(--primary); color:white; border-color:var(--primary)}
    .smallbtn.warn{background:var(--warnbg); color:var(--warn); border-color:#f2d58b}
    .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px}
    .stat{border:1px solid var(--line); background:#fafbff; border-radius:16px; padding:10px 8px; text-align:center}
    .stat b{font-size:17px; display:block}
    .stat span{font-size:11px; color:var(--muted)}
    .progresswrap{height:10px; border-radius:999px; background:#e8edf7; overflow:hidden; margin-top:12px}
    .progressbar{height:100%; width:0%; background:linear-gradient(90deg,var(--primary),#6d8cff); transition:width .25s}
    .questionMeta{display:flex; justify-content:space-between; gap:8px; color:var(--muted); font-size:13px; margin-bottom:10px}
    .word{font-size:42px; line-height:1.1; font-weight:850; letter-spacing:.01em; text-align:center; margin:18px 0 4px}
    .pronounce{text-align:center; color:var(--muted); font-size:13px; margin-bottom:18px}
    .prompt{font-size:15px; color:#39445a; text-align:center; margin:0 0 14px}
    .options{display:grid; gap:10px}
    .option{width:100%; text-align:left; border:1.5px solid var(--line); background:white; border-radius:18px; padding:14px 14px; font-weight:700; color:var(--ink); box-shadow:0 3px 10px rgba(0,0,0,.035); transition:.12s transform,.12s border,.12s background}
    .option:active{transform:scale(.99)}
    .option.correct{border-color:#95d7b3; background:var(--okbg); color:#086a39}
    .option.wrong{border-color:#f0a1a1; background:var(--ngbg); color:#9b2222}
    .option.dim{opacity:.65}
    .result{display:none; margin-top:14px; border-radius:18px; padding:14px; border:1px solid var(--line); background:#fafbff}
    .result.ok{background:var(--okbg); border-color:#bfe8cf}
    .result.ng{background:var(--ngbg); border-color:#f3c0c0}
    .result h2{font-size:18px; margin:0 0 8px}
    .answerline{font-size:15px; line-height:1.65; margin:0;}
    .actions{display:flex; gap:10px; margin-top:14px}
    .actions button{flex:1}
    .blockGrid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:12px}
    .blockBtn{border:1px solid var(--line); background:white; border-radius:14px; min-height:45px; font-weight:800; color:var(--ink)}
    .blockBtn.active{background:var(--primary); color:white; border-color:var(--primary)}
    .blockBtn.done{background:var(--okbg); border-color:#bfe8cf; color:#08723d}
    .end{display:none; text-align:center}
    .end h2{margin:4px 0 8px}
    .reviewList{display:grid; gap:8px; margin-top:12px; text-align:left}
    .reviewItem{border:1px solid var(--line); border-radius:14px; padding:10px 12px; background:#fff}
    .hint{font-size:12px; color:var(--muted); line-height:1.55; margin-top:8px}
    details{margin-top:12px}
    summary{cursor:pointer; color:var(--primary); font-weight:800}
    .kbd{font-family:ui-monospace,Menlo,monospace; font-size:11px; padding:2px 6px; background:#eef1f7; border-radius:6px}
    @media (max-width:520px){
      .app{padding-left:12px; padding-right:12px}
      header{margin-left:-12px; margin-right:-12px; padding-left:12px; padding-right:12px}
      h1{font-size:18px}
      .controls{grid-template-columns:1fr}
      .stats{grid-template-columns:repeat(2,1fr)}
      .word{font-size:38px}
      .blockGrid{grid-template-columns:repeat(4,1fr)}
      .actions{flex-direction:column}
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="topline">
        <div>
          <h1>フランス語 重要1000語 MCQ</h1>
          <div class="subtitle">50語×20ブロック。正解は0.8秒で自動進行、間違いは復習ブロックへ追加。</div>
        </div>
        <div class="pill">offline / single HTML</div>
      </div>
    </header>

    <section class="card">
      <div class="controls">
        <div>
          <label for="blockSelect">学習ブロック</label>
          <select id="blockSelect"></select>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; align-items:end;">
          <button class="smallbtn primary" id="startBtn">このブロックを開始</button>
          <button class="smallbtn warn" id="resetBtn">進捗リセット</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><b id="statBlock">1</b><span>Block</span></div>
        <div class="stat"><b id="statQ">1/50</b><span>Question</span></div>
        <div class="stat"><b id="statScore">0</b><span>Correct</span></div>
        <div class="stat"><b id="statRate">0%</b><span>Accuracy</span></div>
      </div>
      <div class="progresswrap"><div class="progressbar" id="progressBar"></div></div>
      <details>
        <summary>ブロック一覧</summary>
        <div class="blockGrid" id="blockGrid"></div>
        <p class="hint">各ブロックは50語です。選択肢は同じ品詞・近い意味カテゴリから優先的に生成されます。</p>
      </details>
    </section>

    <section class="card" id="quizCard">
      <div class="questionMeta"><span id="metaCat">---</span><span id="metaId">---</span></div>
      <div class="word" id="word">---</div>
      <div class="pronounce" id="posLabel">---</div>
      <p class="prompt">このフランス語に最も近い日本語の意味は？</p>
      <div class="options" id="options"></div>
      <div class="result" id="resultBox">
        <h2 id="resultTitle"></h2>
        <p class="answerline" id="answerLine"></p>
        <div class="actions">
          <button class="smallbtn primary" id="nextBtn">次の問題へ</button>
          <button class="smallbtn" id="retryWrongBtn">間違えた問題だけ復習</button>
        </div>
      </div>
    </section>

    <section class="card end" id="endCard">
      <h2>ブロック完了</h2>
      <p id="endSummary"></p>
      <div class="actions">
        <button class="smallbtn primary" id="nextBlockBtn">次のブロックへ</button>
        <button class="smallbtn" id="sameBlockBtn">同じブロックをもう一度</button>
      </div>
      <div id="reviewList" class="reviewList"></div>
    </section>
  </div>

      };
      return m[cat] || cat;
    }
    function saveDone(block, score, total) {
      const done = JSON.parse(localStorage.getItem('fr1000_done') || '{}');
      const prev = done[block] || {score:0,total:0};
      if (score/Math.max(total,1) >= (prev.score/Math.max(prev.total,1))) done[block] = {score,total,date:new Date().toISOString()};
      localStorage.setItem('fr1000_done', JSON.stringify(done));
      renderBlocks();
    }
    function doneData() { return JSON.parse(localStorage.getItem('fr1000_done') || '{}'); }
    function reviewIds() { return JSON.parse(localStorage.getItem('fr1000_review_ids') || '[]'); }
    function saveReviewIds(ids) {
      const unique = [...new Set(ids.map(Number))].filter(id => Number.isFinite(id));
      localStorage.setItem('fr1000_review_ids', JSON.stringify(unique));
      updateReviewOption();
      renderBlocks();
    }
    function addToReview(entry) {
      const ids = reviewIds();
      if (!ids.includes(entry.id)) saveReviewIds([...ids, entry.id]);
      else updateReviewOption();
    }
    function removeFromReview(entry) {
      const ids = reviewIds().filter(id => id !== entry.id);
      saveReviewIds(ids);
    }
    function reviewItems() {
      const ids = reviewIds();
      return ids.map(id => VOCAB.find(v => v.id === id)).filter(Boolean);
    }
    function clearAutoTimer() {
      if (state.autoTimer) {
        clearTimeout(state.autoTimer);
        state.autoTimer = null;
      }
    }
    function updateReviewOption() {
      const opt = $('reviewOption');
      if (opt) opt.textContent = `復習ブロック：間違えた語だけ（${reviewIds().length}語）`;
      const btn = $('retryWrongBtn');
      if (btn) btn.textContent = `復習ブロックを開始（${reviewIds().length}語）`;
    }

    function initSelectors() {
      const sel = $('blockSelect');
      sel.innerHTML = '';
      for (let b=1; b<=TOTAL_BLOCKS; b++) {
        const opt = document.createElement('option');
        opt.value = b;
        opt.textContent = `Block ${b}：${(b-1)*50+1}〜${b*50}語`;
        sel.appendChild(opt);
      }
      const reviewOpt = document.createElement('option');
      reviewOpt.value = 'review';
      reviewOpt.id = 'reviewOption';
      sel.appendChild(reviewOpt);
      const startSelected = () => sel.value === 'review' ? startReviewBlock() : startBlock(Number(sel.value));
      sel.addEventListener('change', startSelected);
      $('startBtn').addEventListener('click', startSelected);
      $('resetBtn').addEventListener('click', () => {
        if (confirm('保存済みの達成状況と復習ブロックをリセットしますか？')) {
          localStorage.removeItem('fr1000_done');
          localStorage.removeItem('fr1000_review_ids');
          startBlock(state.block);
        }
      });
      $('nextBtn').addEventListener('click', nextQuestion);
      $('retryWrongBtn').addEventListener('click', startReviewBlock);
      $('nextBlockBtn').addEventListener('click', () => startBlock(state.block === TOTAL_BLOCKS ? 1 : state.block+1));
      $('sameBlockBtn').addEventListener('click', () => state.reviewMode ? startReviewBlock() : startBlock(state.block));
      updateReviewOption();
      renderBlocks();
    }
    function renderBlocks() {
      const grid = $('blockGrid');
      grid.innerHTML = '';
      const done = doneData();
      for (let b=1; b<=TOTAL_BLOCKS; b++) {
        const btn = document.createElement('button');
        btn.className = 'blockBtn' + (!state.reviewMode && b===state.block?' active':'') + (done[b]?' done':'');
        btn.textContent = done[b] ? `${b} ✓` : `${b}`;
        btn.title = done[b] ? `最高 ${done[b].score}/${done[b].total}` : `Block ${b}`;
        btn.addEventListener('click', () => startBlock(b));
        grid.appendChild(btn);
      }
      const rbtn = document.createElement('button');
      const rcount = reviewIds().length;
      rbtn.className = 'blockBtn' + (state.reviewMode ? ' active' : '');
      rbtn.textContent = `復習 ${rcount}`;
      rbtn.title = '間違えた語だけを集めた復習ブロック';
      rbtn.addEventListener('click', startReviewBlock);
      grid.appendChild(rbtn);
    }
    function startBlock(block) {
      clearAutoTimer();
      state.block = block;
      state.order = blockItems(block).map((_,i)=>i);
      state.reviewEntries = [];
      state.idx = 0; state.answered=false; state.correct=0; state.total=0; state.wrong=[]; state.reviewMode=false;
      $('blockSelect').value = block;
      $('quizCard').style.display = 'block';
      $('endCard').style.display = 'none';
      renderBlocks(); renderQuestion();
    }
    function startReviewBlock() {
      clearAutoTimer();
      const items = reviewItems();
      if (!items.length) {
        alert('復習ブロックは空です。通常ブロックで間違えた語だけがここに追加されます。');
        $('blockSelect').value = state.block;
        return;
      }
      state.reviewEntries = items;
      state.order = items.map((_,i)=>i);
      state.idx = 0; state.answered=false; state.correct=0; state.total=0; state.wrong=[]; state.reviewMode=true;
      $('blockSelect').value = 'review';
      $('resultBox').style.display='none';
      $('quizCard').style.display = 'block';
      $('endCard').style.display = 'none';
      renderBlocks(); renderQuestion();
    }
    function startWrongReview() { startReviewBlock(); }
    function currentEntry() {
      if (state.reviewMode) {
        const localIndex = state.order[state.idx];
        return {entry:state.reviewEntries[localIndex], localIndex};
      }
      const localIndex = state.order[state.idx];
      return {entry:blockItems(state.block)[localIndex], localIndex};
    }
    function buildOptions(entry) {
      const correct = entry.jp;
      const sameCat = VOCAB.filter(v => v.id !== entry.id && v.cat === entry.cat && v.jp !== correct);
      const samePos = VOCAB.filter(v => v.id !== entry.id && v.pos === entry.pos && v.jp !== correct && v.cat !== entry.cat);
      const broad = VOCAB.filter(v => v.id !== entry.id && v.jp !== correct);
      const seed = entry.id * 9973 + state.block * 37;
      const pool = [];
      for (const v of shuffle(sameCat, seed)) if (!pool.some(x=>x.jp===v.jp)) pool.push(v);
      for (const v of shuffle(samePos, seed+11)) if (pool.length<10 && !pool.some(x=>x.jp===v.jp)) pool.push(v);
      for (const v of shuffle(broad, seed+23)) if (pool.length<10 && !pool.some(x=>x.jp===v.jp)) pool.push(v);
      const distractors = pool.slice(0,3).map(v=>v.jp);
      return shuffle([correct, ...distractors], seed+101);
    }
    function renderStats() {
      const totalQ = state.order.length || BLOCK_SIZE;
      $('statBlock').textContent = state.reviewMode ? '復習' : state.block;
      $('statQ').textContent = `${Math.min(state.idx+1,totalQ)}/${totalQ}`;
      $('statScore').textContent = state.correct;
      $('statRate').textContent = state.total ? `${Math.round(state.correct/state.total*100)}%` : '0%';
      $('progressBar').style.width = `${Math.round((state.idx)/totalQ*100)}%`;
    }
    function renderQuestion() {
      clearAutoTimer();
      if (state.idx >= state.order.length) return finishBlock();
      state.answered = false;
      const {entry} = currentEntry();
      $('word').textContent = entry.fr;
      $('posLabel').textContent = `${entry.pos} / ${labelCat(entry.cat)}`;
      $('metaCat').textContent = state.reviewMode ? '復習ブロック' : `Block ${state.block}`;
      $('metaId').textContent = `#${entry.id}`;
      $('resultBox').style.display = 'none';
      $('resultBox').className = 'result';
      $('nextBtn').style.display = 'block';
      $('retryWrongBtn').style.display = reviewIds().length ? 'block' : 'none';
      updateReviewOption();
      const optBox = $('options'); optBox.innerHTML = '';
      for (const opt of buildOptions(entry)) {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt;
        btn.addEventListener('click', () => answer(opt, btn));
        optBox.appendChild(btn);
      }
      renderStats();
    }
    function answer(selected, btn) {
      if (state.answered) return;
      clearAutoTimer();
      state.answered = true; state.total++;
      const {entry, localIndex} = currentEntry();
      const isCorrect = selected === entry.jp;
      if (isCorrect) {
        state.correct++;
        if (state.reviewMode) removeFromReview(entry);
      } else {
        if (!state.wrong.some(w => w.id === entry.id)) state.wrong.push({...entry, localIndex, selected});
        addToReview(entry);
      }
      [...document.querySelectorAll('.option')].forEach(b => {
        b.disabled = true;
        if (b.textContent === entry.jp) b.classList.add('correct');
        else if (b === btn) b.classList.add('wrong');
        else b.classList.add('dim');
      });
      const rb = $('resultBox');
      rb.style.display='block'; rb.className = 'result ' + (isCorrect?'ok':'ng');
      $('resultTitle').textContent = isCorrect ? '正解：0.8秒後に次へ' : '不正解：復習ブロックに追加済み';
      $('answerLine').innerHTML = `<b>${entry.fr}</b> = <b>${entry.jp}</b><br><span style="color:var(--muted)">品詞：${entry.pos} ／ 分類：${labelCat(entry.cat)}</span>`;
      $('nextBtn').style.display = isCorrect ? 'none' : 'block';
      $('retryWrongBtn').style.display = reviewIds().length ? 'block' : 'none';
      updateReviewOption();
      renderStats();
      if (isCorrect) {
        state.autoTimer = setTimeout(nextQuestion, 800);
      } else {
        setTimeout(()=> $('resultBox').scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
      }
    }
    function nextQuestion() {
      clearAutoTimer();
      state.idx++;
      $('progressBar').style.width = `${Math.round((state.idx)/state.order.length*100)}%`;
      renderQuestion();
      window.scrollTo({top:0, behavior:'smooth'});
    }
    function finishBlock() {
      clearAutoTimer();
      $('quizCard').style.display = 'none';
      $('endCard').style.display = 'block';
      const total = state.total || state.order.length;
      const rate = Math.round(state.correct/Math.max(total,1)*100);
      const remaining = reviewIds().length;
      $('endSummary').innerHTML = `結果：<b>${state.correct}/${total}</b> 正解（${rate}%）` + (state.reviewMode ? `<br>復習ブロック完了。残り：<b>${remaining}</b>語` : `<br>復習ブロック：<b>${remaining}</b>語`);
      if (!state.reviewMode) saveDone(state.block, state.correct, total);
      $('sameBlockBtn').textContent = state.reviewMode ? '復習ブロックをもう一度' : '同じブロックをもう一度';
      $('nextBlockBtn').style.display = state.reviewMode ? 'none' : 'block';
      const review = $('reviewList'); review.innerHTML = '';
      if (state.wrong.length) {
        const title = document.createElement('div');
        title.className = 'hint';
        title.innerHTML = '<b>今回間違えた語：</b>これらは復習ブロックに保存されました。復習で正解すると復習ブロックから外れます。';
        review.appendChild(title);
        state.wrong.forEach(w => {
          const div = document.createElement('div');
          div.className='reviewItem';
          div.innerHTML = `<b>${w.fr}</b> = ${w.jp}<br><span style="color:var(--muted);font-size:12px">あなたの選択：${w.selected}</span>`;
          review.appendChild(div);
        });
      } else {
        const div = document.createElement('div');
        div.className='reviewItem';
        div.textContent = state.reviewMode ? '復習ブロック内の出題にすべて正解しました。残りが0語なら復習完了です。' : '全問正解です。次のブロックへ進んでください。';
        review.appendChild(div);
      }
      updateReviewOption();
      renderStats();
      window.scrollTo({top:0, behavior:'smooth'});
    }
    document.addEventListener('keydown', (e)=>{
      if (state.answered && $('nextBtn').style.display !== 'none' && (e.key==='Enter' || e.key===' ')) nextQuestion();
      const n = Number(e.key);
      if (!state.answered && n>=1 && n<=4) {
        const btn = document.querySelectorAll('.option')[n-1];
        if (btn) btn.click();
      }
    });
    initSelectors();
    startBlock(1);
  </script>
